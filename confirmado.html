<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Email confirmado — Alvø</title>
  <meta property="og:title" content="Alvø — agenda de provas" />
  <meta property="og:description" content="Seu email foi confirmado. Volte ao app Alvø." />
  <meta name="theme-color" content="#0a0a0a" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      min-height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 32px 24px; gap: 8px;
    }
    .logo { font-size: 40px; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px; }
    .badge {
      width: 72px; height: 72px; border-radius: 50%;
      background: #C0E030; color: #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      font-size: 38px; font-weight: 900; margin: 8px 0 12px;
    }
    h1 { font-size: 21px; font-weight: 800; }
    p { color: rgba(255,255,255,0.6); font-size: 15px; line-height: 1.5; max-width: 320px; margin: 6px 0 22px; }
    .btn {
      display: block; width: 100%; max-width: 320px;
      padding: 15px 20px; border-radius: 14px;
      font-size: 16px; font-weight: 800; text-decoration: none;
      margin-bottom: 12px;
    }
    .btn-primary { background: #C0E030; color: #0a0a0a; }
    .btn-secondary { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
    .hint { color: rgba(255,255,255,0.35); font-size: 12px; margin-top: 8px; max-width: 300px; }
    .erro .badge { background: #ff5a5a; color: #fff; }
  </style>
</head>
<body>
  <div class="wrap" id="wrap">
    <div class="logo">ALVØ</div>
    <div class="badge" id="badge">✓</div>
    <h1 id="titulo">Email confirmado!</h1>
    <p id="msg">Sua conta está pronta. Abra o app Alvø e entre com seu email e senha.</p>
    <a id="abrir" class="btn btn-primary" href="alvo://">Abrir o Alvø</a>
    <a id="appstore" class="btn btn-secondary" href="https://apps.apple.com/app/id6780298704">Baixar na App Store</a>
    <div class="hint" id="hint">Se o app não abrir sozinho, é só voltar pra ele manualmente e fazer login.</div>
  </div>

  <script>
    (function () {
      var APP_STORE = "https://apps.apple.com/app/id6780298704";
      // Supabase devolve infos no hash (#) e em erros no query (?).
      var hash = (location.hash || "").substring(1);
      var search = (location.search || "").substring(1);
      var params = new URLSearchParams(hash + "&" + search);

      var erro = params.get("error") || params.get("error_code") || params.get("error_description");

      document.getElementById("appstore").setAttribute("href", APP_STORE);
      document.getElementById("abrir").setAttribute("href", "alvo://");

      if (erro) {
        // Link expirado ou já usado — orienta a entrar mesmo assim.
        document.getElementById("wrap").classList.add("erro");
        document.getElementById("badge").textContent = "!";
        document.getElementById("titulo").textContent = "Link expirado";
        document.getElementById("msg").textContent =
          "Esse link de confirmação venceu ou já foi usado. Mas calma: se você já tinha clicado antes, sua conta provavelmente já está confirmada. Abra o app e tente entrar normalmente.";
      }

      // Tenta abrir o app automaticamente (só funciona se estiver instalado).
      setTimeout(function () { window.location.href = "alvo://"; }, 400);
    })();
  </script>
</body>
</html>
